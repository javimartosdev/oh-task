services:
  postgres:
    image: postgres:16-alpine
    container_name: oh-task-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ohtask
      POSTGRES_PASSWORD: ohtask
      POSTGRES_DB: ohtask
    volumes:
      - oh_task_pg:/var/lib/postgresql/data

volumes:
  oh_task_pg:
